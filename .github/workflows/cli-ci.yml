name: CLI CI

on:
  pull_request:
    paths:
      - 'apps/cli/**'
      - 'packages/models/**'
      - 'packages/linx-models/**'
      - 'packages/stores/**'
      - 'scripts/**'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/cli-ci.yml'
      - '.github/workflows/cli-release.yml'
  push:
    branches:
      - main
      - 'feat/**'
    paths:
      - 'apps/cli/**'
      - 'packages/models/**'
      - 'packages/linx-models/**'
      - 'packages/stores/**'
      - 'scripts/**'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/cli-ci.yml'
      - '.github/workflows/cli-release.yml'

jobs:
  cli:
    name: CLI / ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: yarn

      - name: Install
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Build models
        run: yarn build:models

      - name: Build CLI
        run: yarn build:cli

      - name: CLI tests
        run: yarn test:cli

      - name: Pack release tarballs
        run: yarn pack:cli:release

      - name: Smoke install release tarballs
        run: node scripts/smoke-install-cli-release.mjs
