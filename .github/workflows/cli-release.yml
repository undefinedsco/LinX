name: CLI Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to npm after verification'
        required: true
        type: boolean
        default: false
  push:
    tags:
      - 'linx-v*'

jobs:
  verify:
    name: Verify Release / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Build, pack, and smoke
        run: |
          yarn pack:cli:release
          node scripts/smoke-install-cli-release.mjs

      - name: Upload release tarballs
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v5
        with:
          name: cli-release-tarballs
          path: |
            preview/undefineds-co-models-*.tgz
            preview/undefineds-co-linx-*.tgz
          if-no-files-found: error

  publish:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: verify
    if: startsWith(github.ref, 'refs/tags/linx-v') || github.event.inputs.publish == 'true'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download release tarballs
        uses: actions/download-artifact@v5
        with:
          name: cli-release-tarballs
          path: preview

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Dry-run publish models
        run: npm publish --access public --dry-run ./preview/undefineds-co-models-*.tgz

      - name: Dry-run publish CLI
        run: npm publish --access public --dry-run ./preview/undefineds-co-linx-*.tgz

      - name: Publish models
        run: npm publish --access public ./preview/undefineds-co-models-*.tgz

      - name: Publish CLI
        run: npm publish --access public ./preview/undefineds-co-linx-*.tgz
